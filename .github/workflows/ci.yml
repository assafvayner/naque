name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustfmt.toml enables unstable options, so the format check needs nightly.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    # NAQUE_TEST_PG_URL points the integration tests at the Postgres service
    # below; SQLite integration tests run against temp files with no setup.
    env:
      NAQUE_TEST_PG_URL: postgres://naque:naque@localhost:5432/naque
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: naque
          POSTGRES_PASSWORD: naque
          POSTGRES_DB: naque
        ports:
          - 5432:5432
        # Gate the job's steps on the DB accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc
